name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version to publish (example: v1.2.3). Leave blank to auto-increment the latest patch version.'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  checks:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Lint
        run: make lint

  release:
    if: github.ref == 'refs/heads/main'
    needs: checks
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail

          head_commit="$(git rev-parse HEAD)"

          if [[ -n "${INPUT_VERSION:-}" ]]; then
            version="${INPUT_VERSION}"
            if [[ ! "${version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Manual version must match vMAJOR.MINOR.PATCH" >&2
              exit 1
            fi
          else
            head_tag="$(git tag --points-at HEAD --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n 1 || true)"

            if [[ -n "${head_tag}" ]]; then
              version="${head_tag}"
            else
              latest_tag="$(git tag --list --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)"

              if [[ -z "${latest_tag}" ]]; then
                version="v0.0.1"
              else
                version="${latest_tag}"
                version="${version#v}"
                IFS='.' read -r major minor patch <<< "${version}"
                version="v${major}.${minor}.$((patch + 1))"
              fi
            fi
          fi

          existing_commit="$(git rev-list -n 1 "refs/tags/${version}" 2>/dev/null || true)"
          if [[ -n "${existing_commit}" && "${existing_commit}" != "${head_commit}" ]]; then
            echo "Tag ${version} already exists on a different commit" >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "Releasing ${version}"

      - name: Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: make release VERSION=${{ steps.version.outputs.version }}
