version: 2

project_name: claudecc

before:
  hooks:
    - go mod tidy

builds:
  - id: claudecc
    main: ./cmd/ccc
    binary: claudecc
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: claudecc
    ids:
      - claudecc
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

release:
  github:
    owner: ishiyama0530
    name: ccc

changelog:
  disable: true
