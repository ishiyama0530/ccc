version: 2

project_name: ccc

builds:
  - id: ccc
    main: ./cmd/ccc
    binary: ccc
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: ccc
    ids:
      - ccc
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz

checksum:
  name_template: checksums.txt

release:
  github:
    owner: ishiyama0530
    name: ccc
  replace_existing_artifacts: true
  target_commitish: "{{ .Commit }}"

changelog:
  disable: true
