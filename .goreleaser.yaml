version: 2

project_name: ccc

before:
  hooks:
    - go mod tidy

builds:
  - id: ccc
    main: ./cmd/ccc
    binary: ccc
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: ccc
    ids:
      - ccc
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz

  - id: ccc-binary
    ids:
      - ccc
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}{{ if eq .Os \"windows\" }}.exe{{ end }}"
    formats:
      - binary

checksum:
  name_template: checksums.txt

release:
  github:
    owner: ishiyama0530
    name: ccc

changelog:
  disable: true
